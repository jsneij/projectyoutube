name: Complete Enrichment (Full Sync + Enrich)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type ENRICH to confirm (uses ~60 min of GitHub Actions quota)'
        required: true

permissions:
  contents: write

jobs:
  complete-enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Confirm intent
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "ENRICH" ]; then
            echo "ERROR: Type ENRICH to confirm. Aborting."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Write cookies file
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: printenv YT_COOKIES > /tmp/cookies.txt

      - name: Full sync + enrichment
        env:
          YTDLP_PATH: yt-dlp
          YTDLP_COOKIES_FILE: /tmp/cookies.txt
        run: python3 scripts/fetch_youtube_playlists.py --enrich

      - name: Clean up cookies
        if: always()
        run: rm -f /tmp/cookies.txt

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: full sync + enrichment"
            git pull --rebase
            git push
          fi
