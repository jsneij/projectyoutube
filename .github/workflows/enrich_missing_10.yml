name: Enrich Missing (max 10)

on:
  workflow_dispatch:
    inputs:
      transcript_ids:
        description: 'Optional: comma-separated video IDs for transcript download'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  enrich-missing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check unenriched + transcript count
        run: |
          UNENRICHED=$(python3 -c "
          import json
          with open('data/youtube_playlists_compact.json') as f:
              data = json.load(f)
          print(sum(1 for p in data.get('playlists',[]) if not p.get('deleted') for v in p.get('videos',[]) if v.get('enriched')==False))
          ")
          TIDS="${{ github.event.inputs.transcript_ids }}"
          if [ -n "$TIDS" ]; then
            TCOUNT=$(echo "$TIDS" | tr ',' '\n' | grep -c '.')
          else
            TCOUNT=0
          fi
          TOTAL=$((UNENRICHED + TCOUNT))
          echo "Unenriched videos: $UNENRICHED, Transcripts: $TCOUNT, Total: $TOTAL"
          if [ "$TOTAL" -eq 0 ]; then
            echo "ERROR: Nothing to do (no unenriched videos, no transcript IDs)."
            exit 1
          fi
          if [ "$TOTAL" -gt 10 ]; then
            echo "ERROR: $TOTAL items exceeds limit of 10. Use Enrich Missing or Complete Enrichment instead."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Write cookies file
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: printenv YT_COOKIES > /tmp/cookies.txt

      - name: Enrich missing videos
        env:
          YTDLP_PATH: yt-dlp
          YTDLP_COOKIES_FILE: /tmp/cookies.txt
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          ARGS="--enrich-only"
          if [ -n "${{ github.event.inputs.transcript_ids }}" ]; then
            ARGS="$ARGS --transcript-ids ${{ github.event.inputs.transcript_ids }}"
          fi
          python3 scripts/fetch_youtube_playlists.py $ARGS

      - name: Clean up cookies
        if: always()
        run: rm -f /tmp/cookies.txt

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ TRANSCRIPTS/ || git add data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: enrich missing video metadata"
            git pull --rebase
            git push
          fi
